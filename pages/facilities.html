<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>부대시설</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Noto+Sans+KR:wght@300;400;500;700&family=Cormorant+Garamond:wght@600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../common.css">
</head>
<body>
<nav id="nav"></nav>

<style>
.fac-detail-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:28px;margin-top:44px;}
.fdc{background:#fff;overflow:hidden;box-shadow:0 2px 16px rgba(0,0,0,.07);}
.fdc img{width:100%;height:220px;object-fit:cover;display:block;}
.fdc-body{padding:22px 20px 24px;}
.fdc-icon{font-size:1.6rem;margin-bottom:8px;}
.fdc-name{font-family:"Nanum Myeongjo",serif;font-size:1.35rem;font-weight:800;margin-bottom:6px;}
.fdc-sub{font-size:.74rem;font-weight:600;color:var(--g);letter-spacing:.06em;margin-bottom:10px;}
.fdc-detail{font-size:.92rem;color:#555;line-height:1.9;}
.fac-list-full{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:36px;}
.fli-full{display:flex;align-items:center;gap:10px;padding:15px 18px;background:#fff;font-size:.92rem;font-weight:500;border:1px solid #f0f0f0;}
.fli-full .ico{font-size:1.1rem;}
@media(max-width:860px){.fac-detail-grid{grid-template-columns:1fr;}.fac-list-full{grid-template-columns:1fr 1fr;}}
</style>
<div class="page-hero" style="background-image:url('../images/main/main_02.jpg')">
  <div class="page-hero-content">
    <div class="page-breadcrumb"><a href="../index.html">Home</a> · 부대시설</div>
    <h1 class="page-title">부대시설</h1>
  </div>
</div>
<section class="sw" style="background:var(--cr)">
  <div class="cn">
    <div class="rv">
      <p class="slb">Facilities</p>
      <h2 class="sti">여기에 다 있습니다</h2>
      <div class="dvd"></div>
    </div>
    <div class="fac-detail-grid" id="fac-detail-grid"></div>
    <div style="margin-top:52px">
      <h3 style="font-family:'Nanum Myeongjo',serif;font-size:1.2rem;font-weight:800;margin-bottom:4px;">전체 편의시설</h3>
      <div class="dvd"></div>
      <div class="fac-list-full" id="fac-list-full"></div>
    </div>
  </div>
</section>

<footer id="footer"></footer>
<script src="../config.js"></script>
<script src="../common.js"></script>
<script>
window.addEventListener('DOMContentLoaded',()=>{
  applyTheme(); renderNav(); renderFooter(); initReveal();
  
  const grid = document.getElementById("fac-detail-grid");
  const im = CONFIG.images;
  CONFIG.facilities.forEach((f,i)=>{
    const el=document.createElement("div");
    el.className="fdc rv";
    el.innerHTML="<img src=\""+img(im.fac_cards[i]||"")+"\" alt=\""+f.name+"\">"+
      "<div class=\"fdc-body\">"+
      "<div class=\"fdc-name\">"+f.name+"</div>"+
      "<div class=\"fdc-sub\">"+f.sub+"</div>"+
      "<p class=\"fdc-detail\">"+f.detail+"</p></div>";
    grid.appendChild(el);
  });
  const list = document.getElementById("fac-list-full");
  CONFIG.fac_list.forEach(f=>{
    const el=document.createElement("div");
    el.className="fli-full";
    el.innerHTML="<span class=\"ico\" style=\"color:var(--g);font-weight:700;\">·</span>"+f.text;
    list.appendChild(el);
  });

});
</script>
</body>
</html>
