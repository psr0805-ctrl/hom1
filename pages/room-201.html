<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>객실 상세</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Noto+Sans+KR:wght@300;400;500;700&family=Cormorant+Garamond:wght@600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../common.css">
</head>
<body>
<nav id="nav"></nav>

<style>
.rd-layout{display:grid;grid-template-columns:1.1fr 1fr;gap:56px;align-items:start;}
.rd-slider{position:relative;overflow:hidden;}
.rd-arr{position:absolute;top:calc(210px - 21px);z-index:5;background:rgba(0,0,0,.35);border:none;color:#fff;width:42px;height:42px;cursor:pointer;font-size:1.1rem;transition:background .2s;}
.rd-arr:hover{background:rgba(0,0,0,.6);}
.rd-arr-p{left:0;}
.rd-arr-n{right:0;}
.rd-slides{display:flex;transition:transform .5s;}
.rd-slides img{width:100%;height:420px;object-fit:cover;flex-shrink:0;}
.rd-thumbs{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;}
.rd-thumb{width:80px;height:60px;object-fit:cover;cursor:pointer;opacity:.5;border:2px solid transparent;transition:opacity .2s;}
.rd-thumb.on{opacity:1;border-color:var(--g);}
.rd-no{font-family:"Cormorant Garamond",serif;font-size:4rem;font-weight:600;color:var(--gp);line-height:1;margin-bottom:2px;}
.rd-name{font-family:"Nanum Myeongjo",serif;font-size:1.9rem;font-weight:800;margin-bottom:14px;}
.rd-detail{font-size:.97rem;color:#555;line-height:1.95;margin-bottom:20px;}
.rd-tags{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:22px;}
.rd-tag{background:var(--gp);color:var(--g);font-size:.72rem;font-weight:600;padding:5px 12px;}
.rd-cap{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:#e4e4e0;border:1px solid #e4e4e0;margin-bottom:24px;}
.rd-cap-item{background:#fff;padding:14px 16px;text-align:center;}
.rd-cap-lbl{font-size:.66rem;color:#aaa;letter-spacing:.1em;margin-bottom:4px;}
.rd-cap-val{font-size:.9rem;font-weight:700;}
.rd-rsv{display:block;background:var(--g);color:#fff;text-align:center;padding:14px;font-size:.88rem;font-weight:700;letter-spacing:.08em;text-decoration:none;transition:background .2s;}
.rd-rsv:hover{background:var(--g2);}
.rd-nav{display:flex;justify-content:space-between;margin-top:48px;padding-top:24px;border-top:1px solid #e4e4e0;}
.rd-nav a{font-size:.8rem;color:var(--g);text-decoration:none;font-weight:600;letter-spacing:.04em;}
.rd-nav a:hover{text-decoration:underline;}
@media(max-width:860px){
  .rd-layout{grid-template-columns:1fr;gap:28px;}
  .rd-slides img{height:260px;}
}
</style>

<div class="page-hero" id="page-hero">
  <div class="page-hero-content">
    <div class="page-breadcrumb"><a href="../index.html">Home</a> · <a href="rooms.html">객실안내</a> · <span id="t-room-name"></span></div>
    <h1 class="page-title" id="t-page-title"></h1>
  </div>
</div>
<div class="sub-tabs">
  <div class="sub-tabs-inner" id="room-tabs"></div>
</div>

<section class="sw">
  <div class="cn">
    <div class="rd-layout rv">
      <div class="rd-slider">
        <button class="rd-arr rd-arr-p" onclick="rdGo(rdCur-1)">&#8592;</button>
        <button class="rd-arr rd-arr-n" onclick="rdGo(rdCur+1)">&#8594;</button>
        <div class="rd-slides" id="rd-slides"></div>
        <div class="rd-thumbs" id="rd-thumbs"></div>
      </div>
      <div>
        <div class="rd-no" id="t-no"></div>
        <div class="rd-name" id="t-rname"></div>
        <p class="rd-detail" id="t-rdetail"></p>
        <div class="rd-tags" id="t-rtags"></div>
        <div class="rd-cap" id="t-rcap"></div>
        <a href="" class="rd-rsv" id="t-rrsv">예약 문의하기</a>
      </div>
    </div>
    <div class="rd-nav" id="rd-nav"></div>
  </div>
</section>

<footer id="footer"></footer>
<script src="../config.js"></script>
<script src="../common.js"></script>
<script>
window.addEventListener('DOMContentLoaded',()=>{
  applyTheme(); renderNav(); renderFooter();
  renderRoomDetail();
  initReveal();
});
</script>
</body>
</html>
<script>
function renderRoomDetail(){
  // URL에서 호실 번호 감지
  const match = location.pathname.match(/room-(\d+)\.html/);
  if(!match) return;
  const no = match[1];
  const ri = CONFIG.rooms.findIndex(r => r.no === no);
  if(ri < 0) return;
  const r = CONFIG.rooms[ri];
  const im = CONFIG.images;

  document.title = r.no + "호 · " + r.name;
  document.getElementById("t-room-name").textContent = r.name;
  document.getElementById("t-page-title").textContent = r.no + "호 · " + r.name;
  document.getElementById("t-no").textContent = r.no;
  document.getElementById("t-rname").textContent = r.name;
  document.getElementById("t-rdetail").textContent = r.detail;
  document.getElementById("t-rrsv").href = href("pages/reservation.html");

  // 페이지 히어로 배경
  const firstImg = (im.rooms[ri]||[])[0]||"";
  document.getElementById("page-hero").style.backgroundImage = "url('" + img(firstImg) + "')";

  // 태그
  const tags = document.getElementById("t-rtags");
  r.amenities.forEach(a=>{
    const el=document.createElement("span");
    el.className="rd-tag"; el.textContent=a; tags.appendChild(el);
  });

  // 인원/구조
  const cap = document.getElementById("t-rcap");
  [["기준 인원",r.std],["최대 인원",r.max],["구조","복층 독채"],["면적",r.size]].forEach(([lbl,val])=>{
    const el=document.createElement("div");
    el.className="rd-cap-item";
    el.innerHTML="<div class=\"rd-cap-lbl\">"+lbl+"</div><div class=\"rd-cap-val\">"+val+"</div>";
    cap.appendChild(el);
  });

  // 슬라이더
  const slides = document.getElementById("rd-slides");
  const thumbs = document.getElementById("rd-thumbs");
  const roomImgs = im.rooms[ri]||[];
  roomImgs.forEach((src,ii)=>{
    const s=document.createElement("img");
    s.src=img(src); s.alt=r.name;
    slides.appendChild(s);
    const t=document.createElement("img");
    t.className="rd-thumb"+(ii===0?" on":"");
    t.src=img(src);
    t.onclick=()=>rdSlide(ii,t);
    thumbs.appendChild(t);
  });
  startRdAuto(roomImgs.length);

  // 서브탭
  const tabs = document.getElementById("room-tabs");
  CONFIG.rooms.forEach(rm => {
    const a=document.createElement("a");
    a.className="sub-tab"+(rm.no===no?" on":"");
    a.href=href("pages/room-"+rm.no+".html");
    a.textContent=rm.no+"호 · "+rm.name;
    tabs.appendChild(a);
  });

  // 이전/다음 방
  const nav = document.getElementById("rd-nav");
  const prev = CONFIG.rooms[ri-1];
  const next = CONFIG.rooms[ri+1];
  nav.innerHTML =
    (prev ? "<a href=\""+href("pages/room-"+prev.no+".html")+"\">&larr; "+prev.no+"호 · "+prev.name+"</a>" : "<span></span>") +
    (next ? "<a href=\""+href("pages/room-"+next.no+".html")+"\">"+next.no+"호 · "+next.name+" &rarr;</a>" : "<span></span>");
}
let rdCur=0, rdTotal=0, rdTimer;
function rdGo(ii){
  rdCur=(ii+rdTotal)%rdTotal;
  document.getElementById("rd-slides").style.transform="translateX(-"+(rdCur*100)+"%)";
  const thumbs=document.querySelectorAll(".rd-thumb");
  thumbs.forEach(t=>t.classList.remove("on"));
  if(thumbs[rdCur])thumbs[rdCur].classList.add("on");
  clearInterval(rdTimer);
  rdTimer=setInterval(()=>rdGo(rdCur+1),3500);
}
function rdSlide(ii, thumbEl){ rdGo(ii); }
function startRdAuto(total){
  rdTotal=total;
  if(total>1) rdTimer=setInterval(()=>rdGo(rdCur+1),3500);
}
</script>
