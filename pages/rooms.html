<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>객실 안내</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Noto+Sans+KR:wght@300;400;500;700&family=Cormorant+Garamond:wght@600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../common.css">
</head>
<body>
<nav id="nav"></nav>

<style>
.rooms-list{display:grid;grid-template-columns:repeat(3,1fr);gap:28px;margin-top:44px;}
.rc{background:#fff;overflow:hidden;text-decoration:none;color:inherit;display:block;transition:transform .3s,box-shadow .3s;}
.rc:hover{transform:translateY(-6px);box-shadow:0 16px 40px rgba(0,0,0,.12);}
.rc-img{width:100%;height:240px;object-fit:cover;display:block;}
.rc-body{padding:22px 20px 24px;}
.rc-no{font-family:"Cormorant Garamond",serif;font-size:2.8rem;font-weight:600;color:var(--gp);line-height:1;margin-bottom:2px;}
.rc-name{font-family:"Nanum Myeongjo",serif;font-size:1.4rem;font-weight:700;margin-bottom:8px;}
.rc-desc{font-size:.88rem;color:#666;line-height:1.75;margin-bottom:14px;}
.rc-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px;}
.rc-tag{background:var(--gp);color:var(--g);font-size:.68rem;font-weight:600;padding:3px 9px;}
.rc-cap{font-size:.78rem;color:#888;display:flex;gap:16px;padding-top:12px;border-top:1px solid #f0f0f0;}
.rc-cap strong{color:var(--dark);}
.rc-more{display:inline-block;margin-top:12px;font-size:.78rem;font-weight:700;color:var(--g);letter-spacing:.06em;}
@media(max-width:860px){.rooms-list{grid-template-columns:1fr;}}
</style>

<div class="page-hero" id="page-hero" style="background-image:url('../images/main/main_01.jpg')">
  <div class="page-hero-content">
    <div class="page-breadcrumb"><a href="../index.html">Home</a> · 객실안내</div>
    <h1 class="page-title">객실 안내</h1>
  </div>
</div>
<div class="sub-tabs">
  <div class="sub-tabs-inner" id="room-tabs"></div>
</div>

<section class="sw">
  <div class="cn">
    <div class="rooms-list rv" id="rooms-list"></div>
  </div>
</section>

<footer id="footer"></footer>
<script src="../config.js"></script>
<script src="../common.js"></script>
<script>
window.addEventListener('DOMContentLoaded',()=>{
  applyTheme(); renderNav(); renderFooter(); initReveal();
  
  // 서브탭
  const tabs = document.getElementById("room-tabs");
  CONFIG.rooms.forEach(r => {
    const a = document.createElement("a");
    a.className = "sub-tab";
    a.href = href("pages/room-" + r.no + ".html");
    a.textContent = r.no + "호 · " + r.name;
    tabs.appendChild(a);
  });
  // 객실 카드
  const list = document.getElementById("rooms-list");
  const im = CONFIG.images;
  CONFIG.rooms.forEach((r,ri) => {
    const el = document.createElement("a");
    el.className = "rc rv";
    el.href = href("pages/room-" + r.no + ".html");
    const firstImg = (im.rooms[ri]||[])[0]||"";
    el.innerHTML =
      "<img class=\"rc-img\" src=\"" + img(firstImg) + "\" alt=\""+ r.name +"\">"+
      "<div class=\"rc-body\">"+
        "<div class=\"rc-no\">" + r.no + "</div>"+
        "<div class=\"rc-name\">" + r.name + "</div>"+
        "<p class=\"rc-desc\">" + r.desc + "</p>"+
        "<div class=\"rc-tags\">" + r.amenities.map(a=>"<span class=\"rc-tag\">"+a+"</span>").join("") + "</div>"+
        "<div class=\"rc-cap\"><span>기준 <strong>" + r.std + "</strong></span><span>최대 <strong>" + r.max + "</strong></span><span>" + r.size + "</span></div>"+
        "<span class=\"rc-more\">자세히 보기 →</span>"+
      "</div>";
    list.appendChild(el);
  });

});
</script>
</body>
</html>
